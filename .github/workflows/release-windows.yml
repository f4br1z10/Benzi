name: Build e pubblica Gestione Preventivi per Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Scarica il repository e i file LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa Rust stabile
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Installa dipendenze JavaScript e Chromium
        shell: pwsh
        run: |
          npm ci
          npx prisma generate
          npx playwright install chromium

      - name: Compila l'installer Tauri
        shell: pwsh
        run: npm run desktop:build

      - name: Prepara i file della release
        id: release_files
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $releaseDir = Join-Path $PWD "release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -File | Select-Object -First 1
          if (-not $installer) { throw "Installer NSIS non trovato." }

          if ($env:WINDOWS_CERTIFICATE_BASE64 -and $env:WINDOWS_CERTIFICATE_PASSWORD) {
            $certificate = Join-Path $env:RUNNER_TEMP "windows-code-signing.pfx"
            try {
              [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
              $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
                Where-Object { $_.FullName -match '\\x64\\' } |
                Sort-Object FullName -Descending |
                Select-Object -First 1
              if (-not $signTool) { throw "SignTool non trovato." }
              & $signTool.FullName sign /f $certificate /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $installer.FullName
              if ($LASTEXITCODE -ne 0) { throw "Firma digitale dell'installer non riuscita." }
              & $signTool.FullName verify /pa /all /v $installer.FullName
              if ($LASTEXITCODE -ne 0) { throw "Verifica della firma digitale non riuscita." }
            } finally {
              Remove-Item $certificate -Force -ErrorAction SilentlyContinue
            }
          } elseif ($env:WINDOWS_CERTIFICATE_BASE64 -or $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Configurare entrambi i segreti di firma Windows."
          } else {
            Write-Warning "Installer non firmato: configurare i segreti WINDOWS_CERTIFICATE_BASE64 e WINDOWS_CERTIFICATE_PASSWORD."
          }

          Copy-Item $installer.FullName (Join-Path $releaseDir "Gestione-Preventivi-Setup-x64.exe")

          @'
          @echo off
          setlocal
          title Dipendenze Gestione Preventivi
          echo Download e installazione delle dipendenze Gestione Preventivi...
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $dir=Join-Path $env:TEMP 'Gestione-Preventivi-Dependencies'; New-Item -ItemType Directory -Force -Path $dir ^| Out-Null; $vc=Join-Path $dir 'vc_redist.x64.exe'; $wv=Join-Path $dir 'MicrosoftEdgeWebview2Setup.exe'; Invoke-WebRequest 'https://aka.ms/vc14/vc_redist.x64.exe' -OutFile $vc; Invoke-WebRequest 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile $wv; Start-Process $vc -ArgumentList '/install','/quiet','/norestart' -Wait; Start-Process $wv -ArgumentList '/silent','/install' -Wait; Write-Host 'Dipendenze installate correttamente.' -ForegroundColor Green"
          if errorlevel 1 (
            echo Installazione non completata. Avviare questo file come amministratore.
            pause
            exit /b 1
          )
          echo Operazione completata.
          pause
          '@ | Set-Content (Join-Path $releaseDir "Installa-dipendenze.cmd") -Encoding Ascii

          "installer=$releaseDir\Gestione-Preventivi-Setup-x64.exe" >> $env:GITHUB_OUTPUT
          "dependencies=$releaseDir\Installa-dipendenze.cmd" >> $env:GITHUB_OUTPUT

      - name: Pubblica la GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.release_files.outputs.installer }}" `
            "${{ steps.release_files.outputs.dependencies }}" `
            --repo "${{ github.repository }}" `
            --title "Gestione Preventivi ${{ github.ref_name }}" `
            --notes "Installer Windows self-contained di Gestione Preventivi: include WebView2 offline e installa automaticamente il runtime Visual C++. Installa-dipendenze.cmd viene fornito soltanto come strumento di riparazione."

      - name: Conserva i file anche come artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gestione-Preventivi-Windows
          path: release/*
          if-no-files-found: error
