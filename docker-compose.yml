services:
  sg-clima:
    image: node:22-bookworm
    working_dir: /app
    command: sh -c "npm install && npm run setup && npm run dev"
    ports:
      - "3100:3100"
    volumes:
      - ./:/app
      - sg_clima_node_modules:/app/node_modules
    environment:
      DATABASE_URL: file:../storage/sg-clima.db

volumes:
  sg_clima_node_modules:
